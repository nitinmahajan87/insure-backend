version: '3.8'

services:
  insurtech_db:
    image: postgres:16
    container_name: insurtech_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: insurtech_gateway
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insurtech_net

  redis:
    image: redis:alpine
    container_name: insurtech_redis
    ports:
      - "6380:6379"
    networks:
      - insurtech_net

  # The FastAPI Web Server
  api:
    build: .
    container_name: insurtech_api
    # entrypoint.sh: waits for DB → runs alembic upgrade head → starts uvicorn
    command: ["bash", "./entrypoint.sh"]
    volumes:
      - .:/app
      - ./outbound_files:/app/outbound_files
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - insurtech_db
      - redis
    networks:
      - insurtech_net

  # Celery Worker (task processor)
  worker:
    build: .
    container_name: insurtech_worker
    volumes:
      - .:/app
      - ./outbound_files:/app/outbound_files
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - insurtech_db
      - redis
    networks:
      - insurtech_net

  # Celery Beat (periodic task scheduler — hourly reconciliation sweep)
  beat:
    build: .
    container_name: insurtech_beat
    volumes:
      - .:/app
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - insurtech_db
      - redis
    networks:
      - insurtech_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: insurtech_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80" # Access pgAdmin at http://localhost:5050
    depends_on:
      - insurtech_db
    networks:
      - insurtech_net

networks:
  insurtech_net:
    driver: bridge

volumes:
  postgres_data: