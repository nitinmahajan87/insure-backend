version: '3.8'

services:
  insurtech_db:
    image: postgres:16
    container_name: insurtech_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: insurtech_gateway
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insurtech_net

  redis:
    image: redis:alpine
    container_name: insurtech_redis
    ports:
      - "6380:6379"
    networks:
      - insurtech_net

  # The FastAPI Web Server
  api:
    build: .
    container_name: insurtech_api
    # entrypoint.sh: waits for DB → runs alembic upgrade head → starts uvicorn
    command: ["bash", "./entrypoint.sh"]
    volumes:
      - .:/app
      - ./outbound_files:/app/outbound_files
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - insurtech_db
      - redis
    networks:
      - insurtech_net

  # Celery Worker (task processor)
  worker:
    build: .
    container_name: insurtech_worker
    volumes:
      - .:/app
      - ./outbound_files:/app/outbound_files
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - insurtech_db
      - redis
    networks:
      - insurtech_net

  # Celery Beat (periodic task scheduler — hourly reconciliation sweep)
  beat:
    build: .
    container_name: insurtech_beat
    volumes:
      - .:/app
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - insurtech_db
      - redis
    networks:
      - insurtech_net

  # Object Storage — S3-compatible local store (mirrors AWS S3 ap-south-1 in production)
  minio:
    image: minio/minio:latest
    container_name: insurtech_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI (http://localhost:9001)
    volumes:
      - minio_data:/data
    networks:
      - insurtech_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: creates the bucket on first run then exits
  minio_init:
    image: minio/mc:latest
    container_name: insurtech_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/insurtech-reports &&
        echo 'Bucket ready.'
      "
    networks:
      - insurtech_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: insurtech_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80" # Access pgAdmin at http://localhost:5050
    depends_on:
      - insurtech_db
    networks:
      - insurtech_net

networks:
  insurtech_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data: